<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2f6fed">
<title>Mavi Kod</title>
<style>
  :root{
    --bg:#0d1422; --card:#15213a; --ink:#e9eef8; --muted:#8ba0c2;
    --blue:#2f6fed; --blue-soft:#5b8cff; --blue-deep:#1a3f95; --line:#27344f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;display:flex;align-items:center;justify-content:center;padding:22px;
    background:radial-gradient(1100px 560px at 50% -12%, #1b2c58 0%, var(--bg) 62%);
    color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:40px 34px 30px;max-width:460px;width:100%;text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  .beacon{
    width:58px;height:58px;border-radius:50%;margin:0 auto 20px;
    background:radial-gradient(circle at 36% 30%, var(--blue-soft), var(--blue) 55%, var(--blue-deep));
    box-shadow:0 0 0 9px rgba(47,111,237,.14), 0 0 30px rgba(47,111,237,.55);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 9px rgba(47,111,237,.14), 0 0 26px rgba(47,111,237,.45);}
    50%{box-shadow:0 0 0 13px rgba(47,111,237,.06), 0 0 40px rgba(47,111,237,.75);}
  }
  h1{margin:0 0 8px;font-size:32px;font-weight:700;letter-spacing:.4px;}
  h1 b{color:var(--blue-soft);font-weight:700;}
  .tag{color:var(--muted);font-size:14.5px;line-height:1.55;margin:0 0 22px;}
  .badge{
    display:inline-block;font-size:12px;font-weight:600;color:#c4d6ff;
    background:rgba(47,111,237,.14);border:1px solid rgba(47,111,237,.42);
    border-radius:999px;padding:6px 14px;letter-spacing:.3px;
  }
  .foot{margin-top:28px;padding-top:18px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted);}
  .foot a{color:var(--blue-soft);text-decoration:none;}
  .foot a:hover{text-decoration:underline;}
</style>
</head>
<body>
  <main class="card">
    <div class="beacon" aria-hidden="true"></div>
    <h1>Mavi <b>Kod</b></h1>
    <p class="tag">Hastane mavi kod (acil müdahale) aracı</p>
    <span class="badge">Yapım aşamasında</span>
    <div class="foot"><a href="/">← Acil Epikriz</a></div>
  </main>
</body>
</html>
